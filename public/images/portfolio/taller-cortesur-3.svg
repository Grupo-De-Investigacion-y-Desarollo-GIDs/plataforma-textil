<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <rect width="600" height="400" fill="#f0f4f8"/>
  <!-- Quality control / certificate -->
  <g transform="translate(200, 70)" fill="#1e3a5f" opacity="0.2">
    <rect x="0" y="0" width="200" height="160" rx="8" fill="none" stroke="#1e3a5f" stroke-width="2" opacity="0.3"/>
    <rect x="30" y="20" width="140" height="8" rx="2"/>
    <rect x="50" y="40" width="100" height="6" rx="2" opacity="0.5"/>
    <rect x="60" y="55" width="80" height="6" rx="2" opacity="0.5"/>
    <!-- Checkmarks -->
    <g transform="translate(40, 75)" fill="#27ae60" opacity="0.5">
      <path d="M0,8 L4,12 L12,0" stroke="#27ae60" stroke-width="2" fill="none"/>
      <rect x="20" y="2" width="100" height="6" rx="2" fill="#1e3a5f" opacity="0.3"/>
    </g>
    <g transform="translate(40, 95)" fill="#27ae60" opacity="0.5">
      <path d="M0,8 L4,12 L12,0" stroke="#27ae60" stroke-width="2" fill="none"/>
      <rect x="20" y="2" width="80" height="6" rx="2" fill="#1e3a5f" opacity="0.3"/>
    </g>
    <g transform="translate(40, 115)" fill="#27ae60" opacity="0.5">
      <path d="M0,8 L4,12 L12,0" stroke="#27ae60" stroke-width="2" fill="none"/>
      <rect x="20" y="2" width="90" height="6" rx="2" fill="#1e3a5f" opacity="0.3"/>
    </g>
    <!-- Seal -->
    <circle cx="150" cy="130" r="15" fill="none" stroke="#c0392b" stroke-width="2" opacity="0.4"/>
  </g>
  <text x="300" y="290" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" fill="#1e3a5f" opacity="0.5">Certificaciones</text>
  <text x="300" y="315" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#64748b" opacity="0.5">SST y calidad certificada</text>
</svg>