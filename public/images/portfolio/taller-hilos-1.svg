<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <rect width="600" height="400" fill="#f0f4f8"/>
  <rect x="0" y="0" width="600" height="400" fill="#2563eb" opacity="0.05"/>
  <!-- Workshop layout -->
  <g transform="translate(150, 80)" fill="#1e3a5f" opacity="0.2">
    <rect x="0" y="0" width="300" height="200" rx="8" fill="none" stroke="#1e3a5f" stroke-width="2" opacity="0.2"/>
    <!-- Tables -->
    <rect x="20" y="30" width="80" height="40" rx="4"/>
    <rect x="20" y="90" width="80" height="40" rx="4"/>
    <rect x="120" y="30" width="80" height="40" rx="4"/>
    <rect x="120" y="90" width="80" height="40" rx="4"/>
    <rect x="220" y="30" width="60" height="100" rx="4"/>
    <!-- Labels -->
    <rect x="20" y="150" width="40" height="30" rx="4" fill="#c0392b" opacity="0.3"/>
    <rect x="80" y="150" width="40" height="30" rx="4" fill="#27ae60" opacity="0.3"/>
  </g>
  <text x="300" y="320" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" fill="#1e3a5f" opacity="0.5">Cooperativa Hilos del Sur</text>
  <text x="300" y="345" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#64748b" opacity="0.5">Planta de produccion</text>
</svg>