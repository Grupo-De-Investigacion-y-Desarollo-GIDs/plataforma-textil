<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <rect width="600" height="400" fill="#f0f4f8"/>
  <rect x="0" y="0" width="600" height="400" fill="#1e3a5f" opacity="0.06"/>
  <!-- Industrial cutting machine -->
  <g transform="translate(170, 80)" fill="#1e3a5f" opacity="0.2">
    <rect x="0" y="60" width="260" height="100" rx="8"/>
    <rect x="20" y="30" width="220" height="30" rx="4"/>
    <rect x="100" y="0" width="60" height="30" rx="4"/>
    <!-- Blade -->
    <rect x="125" y="15" width="10" height="50" fill="#c0392b" opacity="0.4"/>
    <!-- Control panel -->
    <rect x="200" y="70" width="40" height="30" rx="4" fill="#27ae60" opacity="0.3"/>
    <circle cx="220" cy="85" r="6" fill="#fff" opacity="0.3"/>
  </g>
  <text x="300" y="280" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" fill="#1e3a5f" opacity="0.5">Corte Sur SRL</text>
  <text x="300" y="305" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#64748b" opacity="0.5">Corte industrial CNC</text>
</svg>