<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <rect width="600" height="400" fill="#f0f4f8"/>
  <!-- Industrial workspace -->
  <g transform="translate(100, 80)" fill="#1e3a5f" opacity="0.18">
    <!-- Floor plan with workstations -->
    <rect x="0" y="0" width="400" height="220" rx="8" fill="none" stroke="#1e3a5f" stroke-width="2" opacity="0.2"/>
    <!-- Workstations row 1 -->
    <rect x="20" y="20" width="50" height="30" rx="4"/>
    <rect x="80" y="20" width="50" height="30" rx="4"/>
    <rect x="140" y="20" width="50" height="30" rx="4"/>
    <rect x="200" y="20" width="50" height="30" rx="4"/>
    <rect x="260" y="20" width="50" height="30" rx="4"/>
    <rect x="320" y="20" width="50" height="30" rx="4"/>
    <!-- Workstations row 2 -->
    <rect x="20" y="70" width="50" height="30" rx="4"/>
    <rect x="80" y="70" width="50" height="30" rx="4"/>
    <rect x="140" y="70" width="50" height="30" rx="4"/>
    <rect x="200" y="70" width="50" height="30" rx="4"/>
    <rect x="260" y="70" width="50" height="30" rx="4"/>
    <rect x="320" y="70" width="50" height="30" rx="4"/>
    <!-- Cutting area -->
    <rect x="20" y="130" width="170" height="70" rx="6" fill="#c0392b" opacity="0.15"/>
    <text x="105" y="170" text-anchor="middle" font-size="11" fill="#1e3a5f" opacity="0.4">CORTE</text>
    <!-- QC area -->
    <rect x="210" y="130" width="170" height="70" rx="6" fill="#27ae60" opacity="0.15"/>
    <text x="295" y="170" text-anchor="middle" font-size="11" fill="#1e3a5f" opacity="0.4">CALIDAD</text>
  </g>
  <text x="300" y="340" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" fill="#1e3a5f" opacity="0.5">Planta 280m2</text>
  <text x="300" y="365" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#64748b" opacity="0.5">14 puestos de trabajo</text>
</svg>