name: E2E Tests

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop]

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      TEST_BASE_URL: ${{ secrets.TEST_BASE_URL }}
      TEST_TALLER_EMAIL: ${{ secrets.TEST_TALLER_EMAIL }}
      TEST_TALLER_PASSWORD: ${{ secrets.TEST_TALLER_PASSWORD }}
      TEST_MARCA_EMAIL: ${{ secrets.TEST_MARCA_EMAIL }}
      TEST_MARCA_PASSWORD: ${{ secrets.TEST_MARCA_PASSWORD }}
      TEST_ADMIN_EMAIL: ${{ secrets.TEST_ADMIN_EMAIL }}
      TEST_ADMIN_PASSWORD: ${{ secrets.TEST_ADMIN_PASSWORD }}
      TEST_ESTADO_EMAIL: ${{ secrets.TEST_ESTADO_EMAIL }}
      TEST_ESTADO_PASSWORD: ${{ secrets.TEST_ESTADO_PASSWORD }}
      UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL_TEST }}
      UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN_TEST }}
      CI_BYPASS_TOKEN: ${{ secrets.CI_BYPASS_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm ci

      - name: Wait for Vercel deployment
        run: |
          EXPECTED_SHA="${{ github.sha }}"
          echo "Waiting for deploy with SHA: $EXPECTED_SHA"
          for i in {1..60}; do
            ACTUAL_SHA=$(curl -s "${{ secrets.TEST_BASE_URL }}/api/health/version" 2>/dev/null | jq -r '.sha // empty' || echo "")
            if [ "$ACTUAL_SHA" = "$EXPECTED_SHA" ]; then
              echo "Deploy ready (attempt $i)"
              exit 0
            fi
            echo "Attempt $i/60: not ready (got: ${ACTUAL_SHA:0:12}, want: ${EXPECTED_SHA:0:12})"
            sleep 10
          done
          echo "::error::Deploy not ready after 10 min — aborting. This is an infra issue (Vercel deploy queue), not a code problem."
          exit 1

      - run: npx playwright install --with-deps chromium

      - run: npx playwright test
        continue-on-error: false

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
