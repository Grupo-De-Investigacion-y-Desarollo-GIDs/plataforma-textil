name: Publicar QA Interactivos

on:
  push:
    branches: [develop]
    paths:
      - '.claude/auditorias/QA_v2-*.md'
      - '.claude/auditorias/QA_v3-*.md'
      - 'tools/generate-qa.js'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generar HTMLs
        run: |
          for f in .claude/auditorias/QA_v2-*.md .claude/auditorias/QA_v3-*.md; do
            [ -f "$f" ] && node tools/generate-qa.js "$f"
          done
          node tools/generate-qa.js --index .claude/auditorias/

      - name: Copiar solo HTMLs a carpeta temporal
        run: |
          mkdir -p _qa_publish
          cp .claude/auditorias/*.html _qa_publish/

      - name: Publicar en GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: _qa_publish
